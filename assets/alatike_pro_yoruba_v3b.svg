<svg width="100%" viewBox="0 0 680 390" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Alatike Pro logo with Yoruba diacritics and English tagline</title>
  <desc>Luxury dark emblem logo for Alatike Pro with bold Yoruba accented wordmark and English tagline on deep mocha background</desc>

  <!-- ── TOP ARC ORNAMENT ── -->
  <path d="M255 128 Q340 72 425 128" fill="none" stroke="#FAF1EA" stroke-width="1.35" stroke-linecap="round" opacity="0.96"/>

  <!-- Three dots on arc -->
  <circle cx="287" cy="108" r="3.5" fill="#FAF1EA" opacity="0.96"/>
  <circle cx="340" cy="89" r="5" fill="#FAF1EA" opacity="0.96"/>
  <circle cx="393" cy="108" r="3.5" fill="#FAF1EA" opacity="0.96"/>

  <!-- Tick lines between dots -->
  <line x1="313" y1="98" x2="314" y2="105" stroke="#FAF1EA" stroke-width="1" stroke-linecap="round" opacity="0.96"/>
  <line x1="367" y1="98" x2="366" y2="105" stroke="#FAF1EA" stroke-width="1" stroke-linecap="round" opacity="0.96"/>

  <!-- Horizontal rules flanking arc -->
  <line x1="80" y1="128" x2="247" y2="128" stroke="#FAF1EA" stroke-width="0.8" opacity="0.92"/>
  <line x1="433" y1="128" x2="600" y2="128" stroke="#FAF1EA" stroke-width="0.8" opacity="0.92"/>
  <circle cx="80" cy="128" r="2.5" fill="#FAF1EA" opacity="0.92"/>
  <circle cx="600" cy="128" r="2.5" fill="#FAF1EA" opacity="0.92"/>

  <!-- ── MAIN WORDMARK — Yoruba diacritics — BOLDER ── -->
  <!-- Shadow layer -->
  <text x="343" y="222" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="66" font-weight="700" letter-spacing="10"
        fill="#A48D78" opacity="0.16">ÀLÁTIKẸ</text>
  <!-- Main text -->
  <text x="340" y="219" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="66" font-weight="700" letter-spacing="10"
        fill="#FFF9F4">ÀLÁTIKẸ</text>

  <!-- ── DIVIDER ── -->
  <line x1="80" y1="246" x2="314" y2="246" stroke="#F0E4D6" stroke-width="0.95" opacity="0.9"/>
  <polygon points="340,238 351,246 340,254 329,246" fill="#F0E4D6" opacity="0.95"/>
  <line x1="366" y1="246" x2="600" y2="246" stroke="#F0E4D6" stroke-width="0.95" opacity="0.9"/>

  <!-- ── PRO — much bolder and larger ── -->
  <text x="340" y="282" text-anchor="middle"
        font-family="Raleway, 'Helvetica Neue', sans-serif"
        font-size="15" font-weight="700" letter-spacing="13"
        fill="#FFF9F4" opacity="0.98">PRO</text>



  <!-- Bottom ornament — directly under PRO -->
  <line x1="272" y1="298" x2="322" y2="298" stroke="#F0E4D6" stroke-width="0.6" opacity="0.72"/>
  <circle cx="340" cy="298" r="2.5" fill="#F0E4D6" opacity="0.84"/>
  <line x1="358" y1="298" x2="408" y2="298" stroke="#F0E4D6" stroke-width="0.6" opacity="0.72"/>
</svg>
